[theme]
# Light base — inherits Streamlit's light defaults then overrides below
base = "light"

# Rich dark chocolate — warm and grounding as the accent
primaryColor = "#690e0eff"

# Warm parchment — like kraft paper, light and immediately warm
backgroundColor = "#F5EAD0"

# Cardboard tan — clearly distinct from background, like a manila folder
secondaryBackgroundColor = "#E0CBA8"

# Deep cocoa brown — warmer and softer than pure black
textColor = "#2A1407"

# Modern sans-serif font
font = "SpaceGrotesk"



[server]
#Disables the cross-origin and request forgery locks inside the cloud container
enableCORS = false
enableXsrfProtection = false
enableStaticServing = true


